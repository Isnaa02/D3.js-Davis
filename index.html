<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Superstore Radial Tree</title>

<script src="https://d3js.org/d3.v7.min.js"></script>

<style>

body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at 20% 10%, rgba(45, 212, 191, 0.12), transparent 16%),
                radial-gradient(circle at 80% 15%, rgba(251, 146, 60, 0.12), transparent 14%),
                radial-gradient(circle at 50% 60%, rgba(15, 23, 42, 0.9), transparent 65%),
                #05070f;
    color: #f8fafc;
}

body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.04), transparent 25%),
                radial-gradient(circle at 20% 80%, rgba(56, 189, 248, 0.06), transparent 14%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(0, 0, 0, 0.16));
    pointer-events: none;
    z-index: -1;
}

/* TITLE */
.title {
    position: absolute;
    top: 22px;
    width: 100%;
    text-align: center;
    color: #7dd3fc;
    font-size: 34px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow: 0 0 18px rgba(125, 211, 252, 0.7), 0 0 32px rgba(56, 189, 248, 0.25);
}

.subtitle {
    position: absolute;
    top: 68px;
    width: 100%;
    text-align: center;
    color: #dbeafe;
    font-size: 14px;
    text-shadow: 0 0 10px rgba(219, 234, 254, 0.45);
}

/* SVG */
svg {
    width: 100vw;
    height: 100vh;
}

/* LINKS */
.link {
    fill: none;
    stroke: rgba(173, 216, 230, 0.34);
    stroke-width: 1.8px;
    stroke-linecap: round;
}

/* NODE */
.node circle {
    transition: 0.24s ease;
    cursor: pointer;
    opacity: 0;
}

.node circle:hover {
    r: 12;
    filter: brightness(1.3);
}

/* TEXT */
.node text {
    fill: #e2f6ff;
    font-size: 12px;
    font-weight: 600;
    text-shadow: 0 0 6px rgba(226, 246, 255, 0.55);
}

/* TOOLTIP */
.tooltip {
    position: absolute;
    background: rgba(7, 12, 25, 0.94);
    border: 1px solid rgba(45, 212, 191, 0.7);
    color: #f8fafc;
    padding: 10px 14px;
    border-radius: 14px;
    opacity: 0;
    pointer-events: none;
    transition: 0.18s ease;
    box-shadow: 0 0 16px rgba(45, 212, 191, 0.18);
}

</style>
</head>

<body>

<div class="title">
SUPERSTORE ARCHIVE
</div>

<div class="subtitle">
Radial category map • D3.js visualization
</div>

<div class="tooltip"></div>

<svg></svg>

<script>

const width = window.innerWidth;
const height = window.innerHeight;
const radius = width / 4.2;

const svg = d3.select("svg")
.append("g")
.attr("transform", `translate(${width/2},${height/2 + 40})`);

const tooltip = d3.select(".tooltip");

fetch("data.json")
.then(res => res.json())
.then(data => {

    const root = d3.hierarchy(data);

    const tree = d3.tree()
    .size([2 * Math.PI, radius]);

    tree(root);

    /* LINKS */
    svg.selectAll(".link")
    .data(root.links())
    .enter()
    .append("path")
    .attr("class","link")
    .attr("d",
        d3.linkRadial()
        .angle(d => d.x)
        .radius(d => d.y)
    );

    /* NODE */
    const node = svg.selectAll(".node")
    .data(root.descendants())
    .enter()
    .append("g")
    .attr("class","node")
    .attr("transform", d => `
        rotate(${d.x * 180 / Math.PI - 90})
        translate(${d.y},0)
    `);

    /* COLOR */
    function getColor(depth){
        if(depth === 0) return "#2dd4bf"; // center
        if(depth === 1) return "#38bdf8"; // year
        if(depth === 2) return "#facc15"; // quarter
        return "#fb923c"; // category
    }

    /* CIRCLE */
    const circles = node.append("circle")
    .attr("r", d => {
        if(d.depth === 0) return 16;
        if(d.depth === 1) return 10;
        if(d.depth === 2) return 7;
        return 5;
    })
    .attr("fill", d => getColor(d.depth))
    .style("filter", d => `drop-shadow(0 0 8px ${getColor(d.depth)}) drop-shadow(0 0 18px ${getColor(d.depth)})`)
    .on("mousemove", (event,d)=>{
        tooltip.style("opacity",1)
        .html(`
            <strong>${d.data.name}</strong><br>
            Level: ${d.depth}
        `)
        .style("left", (event.pageX + 16) + "px")
        .style("top", (event.pageY - 24) + "px");
    })
    .on("mouseout", ()=>{
        tooltip.style("opacity",0);
    });

    circles.transition()
    .duration(800)
    .delay((d,i)=> i * 12)
    .style("opacity", 1);

    /* TEXT */
    node.append("text")
    .attr("dy","0.31em")

    .attr("x", d => d.x < Math.PI ? 14 : -14)

    .attr("text-anchor",
        d => d.x < Math.PI ? "start" : "end"
    )

    .attr("transform",
        d => d.x >= Math.PI ? "rotate(180)" : null
    )

    .text(d => d.data.name);

});

</script>

</body>
</html>
